<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mayor o Menor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/estilo.css">
</head>
<body class="min-h-screen bg-slate-900 text-slate-100 flex flex-col items-center py-10 px-4">

    <div id="pantalla-inicio" class="transition-opacity duration-500 opacity-100 flex flex-col items-center gap-6 w-full max-w-md">
        <header class="text-center">
            <h1 class="text-4xl font-bold">Mayor o Menor</h1>
            <p class="text-slate-400 mt-1">Adivina si la siguiente carta será mayor o menor</p>
        </header>

        <section class="w-full bg-slate-800 rounded-lg p-4">
            <h2 class="text-lg font-semibold mb-2 text-center">🏆 Ranking</h2>
            <ol id="lista-ranking" class="flex flex-col gap-1"></ol>
        </section>

        <div class="w-full flex flex-col gap-2">
            <label for="input-nombre" class="text-sm text-slate-400">Tu nombre</label>
            <input id="input-nombre" type="text" placeholder="Escribe tu nombre" maxlength="20"
                class="w-full rounded-lg bg-slate-800 border border-slate-700 px-3 py-2 text-slate-100 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <button id="btn-continuar" class="px-8 py-2 rounded-lg bg-emerald-600 hover:bg-emerald-500 font-semibold transition">Continuar</button>
    </div>

    <main id="pantalla-juego" class="hidden opacity-0 transition-opacity duration-500 flex flex-col items-center gap-6 w-full max-w-md">

        <header class="text-center">
            <h1 class="text-4xl font-bold">Mayor o Menor</h1>
        </header>

        <section class="flex gap-8 text-center">
            <div>
                <p class="text-sm text-slate-400">Racha</p>
                <p id="racha" class="text-3xl font-bold">0</p>
            </div>
            <div>
                <p class="text-sm text-slate-400">Mejor racha</p>
                <p id="mejor-racha" class="text-3xl font-bold">0</p>
            </div>
        </section>

        <img id="carta-actual" src="" alt="Carta actual" class="w-40 rounded-lg shadow-lg">

        <p id="mensaje" class="text-lg font-semibold text-center text-slate-300 h-6"></p>

        <section class="flex gap-4">
            <button id="btn-menor" class="px-6 py-2 rounded-lg bg-blue-600 hover:bg-blue-500 font-semibold transition">Menor</button>
            <button id="btn-mayor" class="px-6 py-2 rounded-lg bg-blue-600 hover:bg-blue-500 font-semibold transition">Mayor</button>
        </section>

        <section class="flex gap-4">
            <button id="btn-nuevo-juego" class="px-6 py-2 rounded-lg bg-red-600 hover:bg-red-500 font-semibold transition">Nuevo juego</button>
            <button id="btn-volver-ranking" class="hidden px-6 py-2 rounded-lg bg-slate-700 hover:bg-slate-600 font-semibold transition">Ver ranking</button>
        </section>

    </main>

    <script type="module" src="js/main.js"></script>
</body>
</html>
