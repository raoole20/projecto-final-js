<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Poker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/estilo.css">
</head>
<body class="min-h-screen bg-slate-900 text-slate-100 flex flex-col items-center py-10 px-4">

    <div id="pantalla-inicio" class="transition-opacity duration-500 opacity-100 flex flex-col items-center gap-6 w-full max-w-md">
        <header class="text-center">
            <h1 class="text-4xl font-bold">Video Poker</h1>
            <p class="text-slate-400 mt-1">Duelo de 5 cartas contra la máquina — gana la mejor jugada</p>
        </header>

        <section class="w-full bg-slate-800 rounded-lg p-4">
            <h2 class="text-lg font-semibold mb-2 text-center">🏆 Ranking</h2>
            <ol id="lista-ranking" class="flex flex-col gap-1"></ol>
        </section>

        <div class="w-full flex flex-col gap-2">
            <label for="input-nombre" class="text-sm text-slate-400">Tu nombre</label>
            <input id="input-nombre" type="text" placeholder="Escribe tu nombre" maxlength="20"
                class="w-full rounded-lg bg-slate-800 border border-slate-700 px-3 py-2 text-slate-100 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <button id="btn-continuar" class="px-8 py-2 rounded-lg bg-emerald-600 hover:bg-emerald-500 font-semibold transition">Continuar</button>
    </div>

    <main id="pantalla-juego" class="hidden opacity-0 transition-opacity duration-500 flex flex-col items-center gap-6 w-full max-w-3xl">

        <header class="w-full flex items-center justify-between">
            <h1 class="text-3xl font-bold">Video Poker</h1>
            <p id="ronda" class="text-sm font-semibold text-slate-200 bg-slate-800 px-3 py-1 rounded-full">Ronda 1 / 5</p>
        </header>

        <div class="w-full flex flex-col lg:flex-row gap-6 items-center lg:items-start justify-center">

            <aside class="w-full lg:w-56 shrink-0 bg-slate-800 rounded-lg p-3 order-2 lg:order-1">
                <h2 class="text-sm font-semibold mb-1 text-center text-slate-400">Ranking de manos (mejor a peor)</h2>
                <ol id="ranking-manos" class="flex flex-col gap-0.5 text-sm"></ol>
            </aside>

            <section class="mesa order-1 lg:order-2 flex flex-col items-center justify-center gap-3 px-6 py-8 w-full lg:w-auto">
                <span class="text-xs font-semibold uppercase tracking-widest text-emerald-100/70">Máquina</span>
                <div id="mano-maquina" class="flex justify-center gap-2 sm:gap-3 min-h-[6rem]"></div>
                <div class="w-32 border-t border-emerald-200/20"></div>
                <div id="mano" class="flex justify-center gap-2 sm:gap-3 min-h-[6rem]"></div>
                <span class="text-xs font-semibold uppercase tracking-widest text-amber-200/80">Tú</span>
            </section>

        </div>

        <p id="mensaje" class="text-lg font-semibold text-center text-slate-300 min-h-[3rem] flex items-center px-4"></p>

        <footer class="w-full flex flex-col items-center gap-4">
            <div class="flex items-end gap-6">
                <div class="text-center">
                    <p class="text-sm text-slate-400">🪙 Fichas</p>
                    <p id="fichas" class="text-3xl font-bold text-amber-400">0</p>
                </div>
                <div class="flex flex-col gap-1">
                    <label for="input-apuesta" class="text-sm text-slate-400">Apuesta</label>
                    <input id="input-apuesta" type="number" min="1" step="1" value="10"
                        class="w-28 rounded-lg bg-slate-800 border border-slate-700 px-3 py-2 text-slate-100 focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
            </div>

            <section class="flex flex-wrap justify-center gap-3">
                <button id="btn-apostar" class="px-6 py-2 rounded-lg bg-emerald-600 hover:bg-emerald-500 font-semibold transition">Apostar</button>
                <button id="btn-cambiar" class="px-6 py-2 rounded-lg bg-blue-600 hover:bg-blue-500 font-semibold transition">Cambiar</button>
                <button id="btn-pasar" class="px-6 py-2 rounded-lg bg-slate-600 hover:bg-slate-500 font-semibold transition">Pasar</button>
                <button id="btn-nueva-partida" class="px-6 py-2 rounded-lg bg-amber-600 hover:bg-amber-500 font-semibold transition">Nueva partida</button>
            </section>

            <button id="btn-volver-ranking" class="text-sm text-slate-400 hover:text-slate-200 underline transition">Ver ranking</button>
        </footer>

    </main>

    <script type="module" src="js/main.js"></script>
</body>
</html>
